run:
  interval: 30s
  dryRun: true

switchPolicy:
  unhealthyFor: 2m
  healthyFor: 5m

victoriaMetrics:
  url: http://victoria-metrics.monitoring.svc:8428
  queryPath: /api/v1/query
  timeout: 10s
  metricName: sealos_registry_proxy_status

registry:
  endpoint: https://registry-proxy.example.com:5443
  repository: library/busybox
  reference: latest

targets:
  - ip: 10.0.0.12
    priority: 100
  - ip: 10.0.0.13
    priority: 90
  - ip: 2001:db8::12
    priority: 80
    enabled: false

dns:
  provider: fake
  recordName: registry-proxy.example.com
  ttl: 60
  fake:
    records:
      registry-proxy.example.com/A: 10.0.0.99
  cloudflare:
    apiToken: ${CLOUDFLARE_API_TOKEN}
    zoneId: ${CLOUDFLARE_ZONE_ID}
    proxied: false
  alidns:
    regionId: cn-hangzhou
    accessKeyId: ${ALIYUN_ACCESS_KEY_ID}
    accessKeySecret: ${ALIYUN_ACCESS_KEY_SECRET}
    domainName: example.com
    rr: registry-proxy
